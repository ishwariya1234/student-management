<!DOCTYPE html>
<html>
<head>
    <title>Add Prescription</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
            resize: vertical;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #4e73df;
            box-shadow: 0 0 5px rgba(78,115,223,0.5);
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-save {
            background-color: #28a745;
            color: white;
        }

        .btn-save:hover {
            background-color: #218838;
        }

        .btn-back {
            text-decoration: none;
            background-color: #6c757d;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            margin-left: 10px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background-color: #5a6268;
        }

        .button-group {
            margin-top: 15px;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <h2>🩺 Enter Prescription</h2>

        <form method="POST">

            <textarea name="prescription" required>{{ appointment.prescription if appointment.prescription else '' }}</textarea>

            <div class="button-group">
                <button type="submit" class="btn btn-save">
                    💾 Save Prescription
                </button>

                <a href="/doctor_dashboard" class="btn-back">
                    ⬅ Back
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
